server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: system-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/system/**
        - id: project-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/project/**
        - id: workflow-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/workflow/**
        - id: resource-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/resource/**
        - id: timesheet-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/timesheet/**
        - id: cost-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/cost/**
        - id: knowledge-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/knowledge/**
        - id: ai-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/ai/**
        - id: integration-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/integration/**
        - id: notify-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/notify/**
        - id: report-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/report/**
        - id: audit-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/audit/**
        - id: business-service
          uri: http://localhost:8094
          predicates:
            - Path=/api/business/**
        - id: quality-service
          uri: http://localhost:8095
          predicates:
            - Path=/api/quality/**
        - id: file-service
          uri: http://localhost:8096
          predicates:
            - Path=/api/file/**

logging:
  level:
    com.bank.updg: debug
    root: info