server:
  port: 8084

spring:
  application:
    name: updg-workflow
  datasource:
    url: jdbc:mysql://localhost:3306/updg_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: assign_uuid

logging:
  config: classpath:logback-spring.xml
