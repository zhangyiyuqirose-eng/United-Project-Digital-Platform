server:
  port: 8084

spring:
  application:
    name: updg-workflow
  datasource:
    url: jdbc:h2:mem:updg_workflow;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.flowable.spring.boot.FlowableAutoConfiguration
      - org.flowable.spring.boot.FlowableJpaAutoConfiguration
      - org.flowable.spring.boot.FlowableSecurityAutoConfiguration
      - org.flowable.spring.boot.ProcessEngineAutoConfiguration
      - org.flowable.spring.boot.ProcessEngineServicesAutoConfiguration
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false

# Flowable disabled for H2 compatibility - use stub implementation
flowable:
  enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.bank.updg: debug
    org.flowable: warn
    root: info